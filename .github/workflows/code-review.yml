name: Code Review Automation

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  basic-checks:
    name: Basic Code Checks
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Check for critical issues
      run: |
        echo "🔍 Starting basic code review..."
        
        # 1. 检查JavaScript语法（这是最重要的）
        echo "1. Checking JavaScript syntax..."
        js_files=$(find . -name "*.js" -type f | head -5)
        syntax_errors=0
        for file in $js_files; do
          if node -c "$file" 2>&1 | grep -i "error\|syntax"; then
            echo "❌ CRITICAL: Syntax error in $file"
            syntax_errors=$((syntax_errors + 1))
          fi
        done
        
        if [ $syntax_errors -eq 0 ]; then
          echo "✅ JavaScript syntax is valid"
        else
          echo "❌ Found $syntax_errors syntax errors"
          exit 1
        fi
        
        # 2. 检查文件结构（不强制要求）
        echo "2. Checking project structure..."
        if [ -f "package.json" ]; then
          echo "✅ Found package.json"
        else
          echo "⚠️  No package.json found (warning only)"
        fi
        
        if [ -d "src" ]; then
          echo "✅ Found src directory"
        else
          echo "⚠️  No src directory found (warning only)"
        fi
        
        # 3. 检查关键文件（不强制要求）
        echo "3. Checking key files..."
        important_files=("README.md")
        missing_files=0
        for file in "${important_files[@]}"; do
          if [ -f "$file" ]; then
            echo "✅ Found $file"
          else
            echo "⚠️  Missing $file (warning only)"
            missing_files=$((missing_files + 1))
          fi
        done
        
        if [ $missing_files -gt 0 ]; then
          echo "⚠️  Missing $missing_files important files (warnings only)"
        fi
        
        # 4. 硬编码密码检查（只警告，不失败）
        echo "4. Checking for hardcoded passwords (warning only)..."
        password_files=$(find . -type f \( -name "*.js" -o -name "*.ts" -o -name "*.json" \) \
           -exec grep -l "password.*=.*['\"].*['\"]" {} \; 2>/dev/null || true)
        
        if [ -n "$password_files" ]; then
          echo "⚠️  WARNING: Found files with possible hardcoded passwords"
          echo "$password_files" | while read file; do
            echo "   - $file"
          done
          echo "   Note: This is a warning, not an error. Test passwords are allowed."
        else
          echo "✅ No hardcoded passwords found"
        fi
        
        echo ""
        echo "🎉 Basic checks completed successfully!"
        echo "Note: Warnings are informational, only syntax errors cause failure"

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Run security checks
      run: |
        echo "🔒 Running security checks..."
        
        # 检查明显的安全漏洞（只警告）
        echo "1. Checking for SQL injection patterns..."
        sql_count=$(grep -r "query.*['\"].*\\$" . --include="*.js" --include="*.ts" 2>/dev/null | wc -l || echo 0)
        if [ $sql_count -gt 0 ]; then
          echo "⚠️  WARNING: Found $sql_count possible SQL injection patterns"
        else
          echo "✅ No SQL injection patterns found"
        fi
        
        echo "2. Checking for XSS vulnerabilities..."
        xss_count=$(grep -r -i "innerHTML\|\.html(" . --include="*.js" --include="*.ts" --include="*.html" 2>/dev/null | wc -l || echo 0)
        if [ $xss_count -gt 0 ]; then
          echo "⚠️  WARNING: Found $xss_count possible XSS vulnerabilities"
        else
          echo "✅ No XSS patterns found"
        fi
        
        echo "3. Basic dependency check..."
        if [ -f "package.json" ]; then
          echo "📦 Found package.json"
          echo "✅ Basic dependency check passed"
        else
          echo "ℹ️  No package.json found"
        fi
        
        echo ""
        echo "🔒 Security scan completed - warnings are informational only"

  quality-check:
    name: Code Quality Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Run quality checks
      run: |
        echo "📝 Running code quality checks..."
        
        # 检查代码规范
        echo "1. Checking code conventions..."
        js_files=$(find . -name "*.js" -type f | wc -l)
        ts_files=$(find . -name "*.ts" -type f | wc -l)
        echo "Found $js_files JavaScript files and $ts_files TypeScript files"
        
        # 检查注释（只提供信息）
        echo "2. Checking comments (informational)..."
        if [ $js_files -gt 0 ]; then
          sample_file=$(find . -name "*.js" -type f | head -1)
          if [ -n "$sample_file" ]; then
            total_lines=$(wc -l < "$sample_file" 2>/dev/null || echo 0)
            comment_lines=$(grep -c "^\s*//\|^\s*/\*" "$sample_file" 2>/dev/null || echo 0)
            if [ $total_lines -gt 0 ]; then
              comment_percentage=$((comment_lines * 100 / total_lines))
              echo "Sample file: $sample_file"
              echo "Comment percentage: $comment_percentage%"
            fi
          fi
        fi
        
        # 检查文件大小（只警告）
        echo "3. Checking file sizes..."
        large_files=$(find . -name "*.js" -type f -size +500k 2>/dev/null | wc -l)
        if [ $large_files -gt 0 ]; then
          echo "⚠️  WARNING: Found $large_files very large JavaScript files (>500KB)"
        else
          echo "✅ No excessively large files found"
        fi
        
        echo ""
        echo "📝 Quality check completed - all checks are informational"

  summary:
    name: Review Summary
    runs-on: ubuntu-latest
    needs: [basic-checks, security-scan, quality-check]
    if: always()  # 即使前面的作业失败也运行
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Generate summary report
      run: |
        echo "# 🎯 Code Review Summary" > review-summary.md
        echo "" >> review-summary.md
        echo "## 📊 Review Results" >> review-summary.md
        echo "" >> review-summary.md
        echo "| Check Type | Status |" >> review-summary.md
        echo "|------------|--------|" >> review-summary.md
        echo "| Basic Checks | ${{ needs.basic-checks.result }} |" >> review-summary.md
        echo "| Security Scan | ${{ needs.security-scan.result }} |" >> review-summary.md
        echo "| Quality Check | ${{ needs.quality-check.result }} |" >> review-summary.md
        echo "" >> review-summary.md
        echo "## 🎉 Overall Status" >> review-summary.md
        echo "" >> review-summary.md
        
        # 基本检查是最重要的
        if [[ "${{ needs.basic-checks.result }}" == "success" ]]; then
          echo "✅ **BASIC CHECKS PASSED** - No critical syntax errors" >> review-summary.md
          echo "" >> review-summary.md
          echo "The most important check (syntax validation) passed successfully." >> review-summary.md
          echo "Security and quality warnings are informational and do not block merging." >> review-summary.md
        else
          echo "❌ **BASIC CHECKS FAILED** - Syntax errors found" >> review-summary.md
          echo "" >> review-summary.md
          echo "Critical syntax errors were found. Please fix these before merging." >> review-summary.md
        fi
        
        echo "" >> review-summary.md
        echo "## 📈 Recommendations" >> review-summary.md
        echo "" >> review-summary.md
        
        if [[ "${{ needs.basic-checks.result }}" == "success" ]]; then
          echo "1. ✅ **Ready for review** - Code is syntactically valid" >> review-summary.md
          echo "2. 🔍 **Review warnings** - Check security and quality warnings" >> review-summary.md
          echo "3. 🤝 **Manual review** - Continue with human code review" >> review-summary.md
          echo "4. 🚀 **Merge when ready** - All critical checks passed" >> review-summary.md
        else
          echo "1. 🔧 **Fix syntax errors** - Address critical issues first" >> review-summary.md
          echo "2. 🔄 **Re-run checks** - Verify fixes are correct" >> review-summary.md
          echo "3. 📝 **Review warnings** - Check other findings after fixing syntax" >> review-summary.md
          echo "4. 🎯 **Re-submit** - Once all issues are resolved" >> review-summary.md
        fi
        
        echo "" >> review-summary.md
        echo "---" >> review-summary.md
        echo "*Generated: $(date)*" >> review-summary.md
        echo "*Workflow: ${{ github.workflow }}*" >> review-summary.md
        echo "*Commit: ${{ github.sha }}*" >> review-summary.md
        echo "*Note: Only syntax errors are treated as failures. Warnings are informational.*" >> review-summary.md
        
    - name: Upload summary report
      uses: actions/upload-artifact@v3
      with:
        name: code-review-summary
        path: review-summary.md
        
    - name: Comment on PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          let summary = '';
          try {
            summary = fs.readFileSync('review-summary.md', 'utf8');
          } catch (error) {
            summary = '# Code Review Summary\n\nUnable to generate summary report.';
          }
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: summary
          });
