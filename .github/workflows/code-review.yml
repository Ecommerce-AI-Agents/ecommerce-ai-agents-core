name: Code Review Automation

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 0'  # 每周日运行一次

jobs:
  setup:
    name: Setup Environment
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        
    - name: Install dependencies
      run: |
        if [ -f package.json ]; then
          npm ci
        else
          echo "No package.json found, skipping npm install"
        fi

  security-review:
    name: Security Review
    runs-on: ubuntu-latest
    needs: setup
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Run security checks
      run: |
        echo "🔒 Running basic security checks..."
        
        # 检查硬编码密码
        echo "Checking for hardcoded passwords..."
        if find . -name "*.js" -o -name "*.ts" -o -name "*.json" | xargs grep -l "password.*=.*['\"].*['\"]" 2>/dev/null; then
          echo "❌ Found hardcoded passwords"
          exit 1
        fi
        
        # 检查依赖安全
        echo "Checking dependencies..."
        if [ -f package.json ]; then
          npm audit --audit-level=high || echo "⚠️  Dependency vulnerabilities found"
        fi
        
        echo "✅ Basic security checks passed"

  code-quality:
    name: Code Quality Review
    runs-on: ubuntu-latest
    needs: setup
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        
    - name: Install ESLint if needed
      run: |
        if [ -f package.json ]; then
          if ! grep -q "eslint" package.json; then
            npm install --save-dev eslint
          fi
        fi
        
    - name: Run basic code quality checks
      run: |
        echo "📝 Running basic code quality checks..."
        
        # 检查文件大小
        echo "Checking file sizes..."
        large_files=$(find . -name "*.js" -o -name "*.ts" | xargs wc -l 2>/dev/null | tail -1 | awk '{print $1}')
        echo "Total lines of code: $large_files"
        
        # 简单的语法检查
        echo "Checking JavaScript syntax..."
        if find . -name "*.js" | head -5 | xargs -I {} node -c {} 2>&1 | grep -i error; then
          echo "❌ JavaScript syntax errors found"
          exit 1
        fi
        
        echo "✅ Basic code quality checks passed"

  test-check:
    name: Test Check
    runs-on: ubuntu-latest
    needs: setup
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Check for test files
      run: |
        echo "🧪 Checking for test files..."
        
        test_files=$(find . -name "*.test.js" -o -name "*.spec.js" -o -name "*.test.ts" -o -name "*.spec.ts" | wc -l)
        echo "Found $test_files test files"
        
        if [ $test_files -eq 0 ]; then
          echo "⚠️  No test files found"
        else
          echo "✅ Test files found"
        fi

  summary:
    name: Review Summary
    runs-on: ubuntu-latest
    needs: [security-review, code-quality, test-check]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Generate summary
      run: |
        echo "# 📊 Code Review Summary" > review-summary.md
        echo "" >> review-summary.md
        echo "## 🎯 Review Results" >> review-summary.md
        echo "" >> review-summary.md
        echo "### ✅ Security Review: ${{ needs.security-review.result }}" >> review-summary.md
        echo "### ✅ Code Quality: ${{ needs.code-quality.result }}" >> review-summary.md
        echo "### ✅ Test Check: ${{ needs.test-check.result }}" >> review-summary.md
        echo "" >> review-summary.md
        echo "## 📈 Recommendations" >> review-summary.md
        echo "" >> review-summary.md
        echo "1. ✅ All basic checks passed" >> review-summary.md
        echo "2. 🔄 Ready for further review" >> review-summary.md
        echo "" >> review-summary.md
        echo "---" >> review-summary.md
        echo "*Generated: $(date)*" >> review-summary.md
        
    - name: Upload summary
      uses: actions/upload-artifact@v3
      with:
        name: review-summary
        path: review-summary.md
        
    - name: Comment on PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          const summary = fs.readFileSync('review-summary.md', 'utf8');
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: summary
          });
